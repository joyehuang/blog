name: Bug report
description: Report a site bug, broken page, or incorrect behavior.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem with the site. Please include enough context to reproduce or locate the issue.
  - type: textarea
    id: bug-description
    attributes:
      label: What happened?
      description: A clear description of the problem.
    validations:
      required: true
  - type: input
    id: page-url
    attributes:
      label: Page URL
      description: The page where this happened, if any.
      placeholder: https://joyehuang.me/...
  - type: input
    id: browser
    attributes:
      label: Browser
      description: If this only happens in one browser, which one?
      placeholder: Chrome, Firefox, Safari
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
  - type: checkboxes
    id: maintenance
    attributes:
      label: Maintenance impact
      options:
        - label: This should be reflected in `CHANGELOG.md` after it is fixed.
          required: false
