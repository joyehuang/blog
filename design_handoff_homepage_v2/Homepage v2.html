<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Joye · Personal Blog — v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ── Real Satoshi, lifted straight from blog/public/fonts ── */
  @font-face {
    font-family: 'Satoshi';
    src: url('assets/fonts/Satoshi-Variable.ttf') format('truetype');
    font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Satoshi';
    src: url('assets/fonts/Satoshi-VariableItalic.ttf') format('truetype');
    font-style: italic; font-display: swap;
  }

  /* ── Theme tokens — EXACT copy of blog/src/assets/styles/app.css ── */
  :root {
    --background: 210 33% 99%;
    --foreground: 240 10% 3.9%;
    --card: 0 0% 100%;
    --card-foreground: 240 10% 3.9%;
    --popover: 0 0% 100%;
    --popover-foreground: 240 10% 3.9%;
    --primary: 200 29% 45%;
    --primary-foreground: 0 0% 92.5%;
    --secondary: 240 4.8% 95.9%;
    --secondary-foreground: 240 5.9% 10%;
    --muted: 240 4.8% 95%;
    --muted-foreground: 240 3.8% 28.1%;
    --accent: 240 4.8% 95.9%;
    --accent-foreground: 240 5.9% 10%;
    --destructive: 0 72.22% 50.59%;
    --destructive-foreground: 0 0% 98%;
    --border: 240 5.9% 88%;
    --input: 240 5.9% 90%;
    --ring: 240 5.9% 10%;
    --radius: 0.5rem;
    /* terminal-specific (light) — tuned to sit on the light bg */
    --term-surface: 0 0% 100%;
    --term-chrome: 240 4.8% 97%;
    --term-ok: 150 60% 40%;
    --term-highlight-rgb: 101, 158, 185;
  }
  html.dark {
    --background: 240 20.54% 5.2%;
    --foreground: 0 0% 98%;
    --card: 240 10% 3.9%;
    --card-foreground: 0 0% 98%;
    --popover: 240 10% 3.9%;
    --popover-foreground: 0 0% 98%;
    --primary: 195 95% 85%;
    --primary-foreground: 240 3.7% 15.9%;
    --secondary: 240 3.7% 15.9%;
    --secondary-foreground: 0 0% 98%;
    --muted: 240 5.9% 12%;
    --muted-foreground: 240 5% 74.9%;
    --accent: 240 3.7% 15.9%;
    --accent-foreground: 0 0% 98%;
    --destructive: 0 62.8% 30.6%;
    --destructive-foreground: 0 0% 98%;
    --border: 240 3.7% 19.9%;
    --input: 240 3.7% 15.9%;
    --ring: 240 4.9% 83.9%;
    /* terminal-specific (dark) */
    --term-surface: 240 18% 8%;
    --term-chrome: 240 14% 10%;
    --term-ok: 150 70% 55%;
    --term-highlight-rgb: 142, 196, 219;
  }
  html.dark { color-scheme: dark; }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: hsl(var(--background));
    color: hsl(var(--foreground));
    transition: background-color 0.25s ease, color 0.25s ease;
  }
  a { color: inherit; text-decoration: none; transition: color 0.2s ease; }
  a:hover { color: hsl(var(--primary)); }
  button { font-family: inherit; }

  /* Highlight gradient ribbon at top (matches BaseLayout.astro highlightColor) */
  .highlight-gradient {
    position: absolute; inset: 0 0 auto 0;
    height: 100vh; pointer-events: none; opacity: 0.25; z-index: 0;
    background-image: linear-gradient(#659EB9, transparent);
    transition: opacity 0.25s ease;
  }
  html.dark .highlight-gradient { opacity: 0.18; }

  /* fade-in-up (from global.css) — use `both` so elements stay visible even
     if animation hasn't started (React mount timing). */
  @keyframes fade-in-up {
    0% { transform: translateY(2rem); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  .animate { animation: 300ms fade-in-up both; }
  #content-header { animation-delay: 50ms; }
  #content { animation-delay: 100ms; }

  @keyframes blink { 50% { opacity: 0; } }
  @keyframes ping { 75%,100% { transform: scale(2); opacity: 0; } }
  @keyframes agent-dots {
    0%,20% { content: '.'; }
    40% { content: '..'; }
    60%,100% { content: '...'; }
  }
  .agent-dots::after { content: '.'; animation: agent-dots 1.4s infinite; }

  /* Scrollbar — match global.css */
  :root { --scrollbar-thumb-bg: #c0c0c0; }
  html.dark { --scrollbar-thumb-bg: #4e4e4e; }
  ::-webkit-scrollbar { width: 6px !important; height: 6px !important; background: #0000; }
  ::-webkit-scrollbar-thumb { background-color: var(--scrollbar-thumb-bg); border-radius: 999px; opacity: 0.5; }

  /* Selection — subtle but on-brand in both themes */
  ::selection { background: hsl(var(--primary) / 0.3); color: hsl(var(--foreground)); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="highlight-gradient"></div>
<div id="root"></div>
<script type="text/babel" src="v2/data.jsx"></script>
<script type="text/babel" src="v2/jojo.jsx"></script>
<script type="text/babel" src="v2/human-mode.jsx"></script>
<script type="text/babel" src="v2/dev-mode.jsx"></script>
<script type="text/babel" src="v2/tweaks.jsx"></script>
<script type="text/babel" src="v2/app.jsx"></script>
</body>
</html>
